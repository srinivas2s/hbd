<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Special</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Grid Background -->
    <div class="grid-background"></div>

    <!-- Left Wavy Border — Elegant S-curve ribbon -->
    <svg class="border-left" viewBox="0 0 400 1000" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#db2e50; stop-opacity:0.95" />
                <stop offset="50%" style="stop-color:#eb5b75; stop-opacity:0.92" />
                <stop offset="100%" style="stop-color:#df5470; stop-opacity:0.95" />
            </linearGradient>
        </defs>
        <path d="
            M0,0
            L280,0
            C320,15 340,50 310,100
            C260,180 120,220 80,300
            C40,380 50,420 90,480
            C150,560 280,600 320,680
            C360,760 350,840 300,900
            C270,940 250,970 260,1000
            L0,1000
            Z
        " fill="url(#leftGrad)" />
    </svg>

    <!-- Top-Right Corner Accent -->
    <svg class="border-top-right" viewBox="0 0 500 500" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="trGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#f44568; stop-opacity:0.9" />
                <stop offset="100%" style="stop-color:#e0405d; stop-opacity:0.95" />
            </linearGradient>
        </defs>
        <path d="
            M280,0
            C330,0 380,15 420,50
            C465,90 490,160 500,220
            L500,0
            Z
        " fill="url(#trGrad)" />
    </svg>

    <!-- Bottom-Right Corner Accent -->
    <svg class="border-bottom-right" viewBox="0 0 600 600" preserveAspectRatio="none"
        xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="brGrad" x1="100%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" style="stop-color:#e33051; stop-opacity:0.95" />
                <stop offset="40%" style="stop-color:#e33051; stop-opacity:0.93" />
                <stop offset="100%" style="stop-color:#e33051; stop-opacity:0.9" />
            </linearGradient>
        </defs>
        <path d="
            M600,280
            C590,340 560,390 510,430
            C440,480 350,510 280,530
            C200,550 140,570 100,600
            L600,600
            Z
        " fill="url(#brGrad)" />
    </svg>


    <!-- Content Area -->
    <div class="content-area">
        <div class="hero-section">
            <div class="text-content">
                <h1 class="hey-title" id="main-title">KNOCK KNOCK!!</h1>
                <p class="subtitle-bold" id="question-text">Are you free??</p>
                <div class="button-group" id="btn-group">
                    <button class="btn btn-yes" id="btn-yes">Yes</button>
                    <button class="btn btn-no" id="btn-no">No</button>
                </div>
            </div>
            <div class="cat-container">
                <img src="cat.png" alt="Happy Cat" class="hero-cat side-cat" id="hero-sticker">
            </div>
        </div>
    </div>

    <script>
        const questionText = document.getElementById('question-text');
        const mainTitle = document.getElementById('main-title');
        const btnGroup = document.getElementById('btn-group');
        const heroSticker = document.getElementById('hero-sticker');

        function showInitial() {
            const contentArea = document.querySelector('.content-area');
            contentArea.classList.remove('state-no', 'state-yes');
            contentArea.classList.add('state-initial');

            mainTitle.innerText = "KNOCK KNOCK!!";
            questionText.innerHTML = "Are you free??";
            heroSticker.src = "cat.png";
            btnGroup.innerHTML = `
                <button class="btn btn-yes" id="btn-yes">Yes</button>
                <button class="btn btn-no" id="btn-no">No</button>
            `;
            // Re-attach listeners since innerHTML replaces elements
            document.getElementById('btn-yes').addEventListener('click', showYesState);
            document.getElementById('btn-no').addEventListener('click', showNoState);
        }

        function showNoState() {
            const contentArea = document.querySelector('.content-area');
            contentArea.classList.remove('state-initial', 'state-yes');
            contentArea.classList.add('state-no');

            mainTitle.innerText = "UH OH!!";
            questionText.innerHTML = "I know that you are jobless.<br>Or Are you texting someone else at this hour";
            heroSticker.src = "cat3.png";
            btnGroup.innerHTML = `
                <button class="btn btn-no" id="btn-back" style="width: 100%;">Go Back </button>
            `;
            document.getElementById('btn-back').addEventListener('click', showInitial);
        }

        function showYesState() {
            const contentArea = document.querySelector('.content-area');
            contentArea.classList.remove('state-initial', 'state-no', 'state-excited');
            contentArea.classList.add('state-yes');

            mainTitle.innerText = "YAYYYY!!";
            questionText.innerHTML = "I have a surprise for you";
            heroSticker.src = "cat2.png";
            btnGroup.innerHTML = `
                <button class="btn btn-yes" id="btn-reveal" style="width: 100%;">YESSS! </button>
                <button class="btn btn-no" id="btn-no-from-yes" style="width: 100%; margin-top: 10px; padding: 10px 30px; font-size: 1.2rem;">No</button>
            `;
            document.getElementById('btn-no-from-yes').addEventListener('click', showSadState);
            document.getElementById('btn-reveal').addEventListener('click', showExcitedState);
        }

        function showSadState() {
            const contentArea = document.querySelector('.content-area');
            contentArea.classList.remove('state-initial', 'state-no', 'state-yes', 'state-excited');
            contentArea.classList.add('state-sad');

            mainTitle.innerText = "HMPH!!";
            questionText.innerHTML = "So you don't love me?? ";
            heroSticker.src = "cat6.png"; 
            btnGroup.innerHTML = `
                <button class="btn btn-no" id="btn-back-sad" style="width: 100%;">Go Backkk!</button>
            `;
            document.getElementById('btn-back-sad').addEventListener('click', showYesState);
        }

        function showExcitedState() {
            const contentArea = document.querySelector('.content-area');
            contentArea.classList.remove('state-initial', 'state-no', 'state-yes');
            contentArea.classList.add('state-excited');

            mainTitle.innerText = "WAIT...";
            questionText.innerHTML = "Are you excited? ";
            heroSticker.src = "cat4.png"; 
            
            // Remove YESSS! button and add 3D Gift Box
            btnGroup.innerHTML = `
                <div class="gift-section" style="display: flex; flex-direction: column; align-items: center;">
                    <p class="click-note">Click Here! </p>
                    <div class="gift-container" id="gift-box-click">
                        <div class="gift-box">
                            <div class="side front"></div>
                            <div class="side back"></div>
                            <div class="side left"></div>
                            <div class="side right"></div>
                            <div class="side top">
                                <div class="bow">
                                    <div class="bow-left"></div>
                                    <div class="bow-right"></div>
                                </div>
                            </div>
                            <div class="side bottom"></div>
                        </div>
                    </div>
                </div>
            `;
            
            document.getElementById('gift-box-click').addEventListener('click', function() {
                this.classList.add('open');
                setTimeout(() => {
                    showFinalSurprise();
                }, 800);
            });
        }

        function showFinalSurprise() {
            const contentArea = document.querySelector('.content-area');
            contentArea.classList.remove('state-excited');
            contentArea.classList.add('state-final-surprise');

            mainTitle.innerText = "HAPPY BIRTHDAY!!";
            questionText.innerHTML = "Wishing you the best day ever! ";
            heroSticker.src = "cat2.png"; // Or a special hbd cat if available
            btnGroup.innerHTML = `
                <button class="btn btn-yes" onclick="location.reload()" style="width: 100%;">Replay?  </button>
            `;
        }

        // Initialize listeners
        showInitial();
    </script>

</body>

</html>
