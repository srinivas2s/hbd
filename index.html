<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Special</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Left Wavy Border — Full-height dramatic S-curve -->
    <svg class="border-left" viewBox="0 0 1000 1000" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="
            M0,0
            L350,0
            C400,10 420,40 380,100
            C320,180 180,220 120,300
            C50,390 40,440 80,520
            C140,620 300,680 380,760
            C460,840 480,900 480,1000
            L0,1000
            Z
        " fill="rgba(138, 8, 51, 0.92)" />
    </svg>

    <!-- Top-Right Organic Corner -->
    <svg class="border-top-right" viewBox="0 0 500 500" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="
            M200,0
            C250,0 300,20 350,60
            C420,120 480,220 500,280
            L500,0
            Z
        " fill="rgba(140, 20, 60, 0.92)" />
    </svg>

    <!-- Bottom-Right Organic Corner -->
    <svg class="border-bottom-right" viewBox="0 0 1000 400" preserveAspectRatio="none"
        xmlns="http://www.w3.org/2000/svg">
        <path d="
            M0,400
            L0,350
            C100,280 200,250 350,280
            C500,310 650,260 800,300
            C900,330 950,360 1000,340
            L1000,400
            Z
        " fill="rgba(140, 20, 60, 0.92)" />
    </svg>

    <div class="grid-background">

        <!-- Content will go here -->
    </div>
</body>

</html>
