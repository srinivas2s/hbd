<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Special</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Grid Background -->
    <div class="grid-background"></div>

    <!-- Left Wavy Border — Elegant S-curve ribbon -->
    <svg class="border-left" viewBox="0 0 400 1000" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="leftGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#8a0833; stop-opacity:0.95" />
                <stop offset="50%" style="stop-color:#a01045; stop-opacity:0.92" />
                <stop offset="100%" style="stop-color:#7a0630; stop-opacity:0.95" />
            </linearGradient>
        </defs>
        <path d="
            M0,0
            L280,0
            C320,15 340,50 310,100
            C260,180 120,220 80,300
            C40,380 50,420 90,480
            C150,560 280,600 320,680
            C360,760 350,840 300,900
            C270,940 250,970 260,1000
            L0,1000
            Z
        " fill="url(#leftGrad)" />
    </svg>

    <!-- Top-Right Corner Accent -->
    <svg class="border-top-right" viewBox="0 0 500 500" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="trGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#8a0833; stop-opacity:0.9" />
                <stop offset="100%" style="stop-color:#a01045; stop-opacity:0.95" />
            </linearGradient>
        </defs>
        <path d="
            M280,0
            C330,0 380,15 420,50
            C465,90 490,160 500,220
            L500,0
            Z
        " fill="url(#trGrad)" />
    </svg>

    <!-- Bottom-Right Corner Accent -->
    <svg class="border-bottom-right" viewBox="0 0 500 500" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <linearGradient id="brGrad" x1="100%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" style="stop-color:#7a0630; stop-opacity:0.95" />
                <stop offset="100%" style="stop-color:#a01045; stop-opacity:0.9" />
            </linearGradient>
        </defs>
        <path d="
            M500,300
            C490,360 465,420 420,460
            C380,490 330,500 280,500
            L500,500
            Z
        " fill="url(#brGrad)" />
    </svg>

    <!-- Floating Decorative Dots -->
    <div class="dot dot-1"></div>
    <div class="dot dot-2"></div>
    <div class="dot dot-3"></div>
    <div class="dot dot-4"></div>
    <div class="dot dot-5"></div>

    <!-- Content Area -->
    <div class="content-area">
        <!-- Content will go here -->
    </div>

</body>

</html>
