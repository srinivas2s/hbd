<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Birthday Special</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Left Wavy Border — Full-height dramatic S-curve -->
    <svg class="border-left" viewBox="0 0 1000 1000" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="
            M0,0
            L600,0
            C650,10 680,40 650,80
            C580,160 300,200 180,280
            C60,360 30,420 80,500
            C160,600 450,660 560,740
            C670,820 700,880 700,1000
            L0,1000
            Z
        " fill="rgba(138, 8, 51, 0.92)" />
    </svg>

    <!-- Top-Right Organic Corner -->
    <svg class="border-top-right" viewBox="0 0 500 500" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
        <path d="
            M200,0
            C250,0 300,20 350,60
            C420,120 480,220 500,280
            L500,0
            Z
        " fill="rgba(140, 20, 60, 0.92)" />
    </svg>

    <!-- Bottom-Right Organic Corner -->
    <svg class="border-bottom-right" viewBox="0 0 500 500" preserveAspectRatio="none"
        xmlns="http://www.w3.org/2000/svg">
        <path d="
            M500,220
            C480,280 420,380 350,440
            C300,480 250,500 200,500
            L500,500
            Z
        " fill="rgba(140, 20, 60, 0.92)" />
    </svg>

    <div class="grid-background">

        <!-- Content will go here -->
    </div>
</body>

</html>
